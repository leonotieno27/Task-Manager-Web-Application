<!DOCTYPE html>
<html>
  <head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="unsemantic-grid-responsive-tablet-no-ie7.css"
    />
  </head>
  <body>
    <h1>Task Manager Web Application</h1>
    <div class="grid-container">
      <div class="grid-100 flex-items">
        <div class="grid-70">
          <div>
            <h1 class="alignLeft">Your Daily Tasks</h1>
            <div id="task-contents">
                <h1 class="noTasks">No Available Tasks</h1>

            </div>
          </div>
        </div>
        <div class="grid-30">
          <h1 class="alignLeft">Add New Task</h1>
          <div class="addTaskSpace">
            
            <label for="taskname"
              >Task Name: <br />
              <input type="text" name="taskName" class="taskName" /><br />
            </label>
            <label for="taskDescription"
              >Task Description: <br />
              <input
                type="text"
                name="taskDescription"
                class="taskDesc"
              /><br />
            </label>
            <label for="date">
             Set Deadline: <br />
              <input type="datetime-local" name="datetime" class="dateTime" />
            </label> <br><br>
            <button class="btn" id="addTaskButton"> Submit
                <img class="task-img" src="assets/task.png" alt="" />
              </button>
            
          </div>
          
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
