<!DOCTYPE html>
<html>
  <head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Task Manager Web Application</h1>

    <fieldset class="fieldset-register">
      <legend><h2>REGISTER</h2></legend>
      <form action="#server">
        <label
          >First name: <br />
          <input type="text" name="firstname" id="fname" /></label
        ><br />
        <label
          >Last name:<br />
          <input type="text" name="lastname" id="lname" /></label
        ><br />
        <label
          >Username: <br />
          <input type="text" name="username" id="username" /></label
        ><br />
        <label for="email"
          >Email:<br />
          <input type="email" name="email" id="email" /></label
        ><br />
        <label
          >Gender:<br />
          <input
            type="radio"
            name="gender"
            id="gender"
            value="male"
          />Male</label
        >
        <label>
          <input
            type="radio"
            name="gender"
            id="gender"
            value="female"
          />Female</label
        >
        <label>
            <input
              type="radio"
              name="gender"
              id="gender"
              value="female"
              checked="checked"
            />Prefer not to say</label
          ><br />
        <label
          >Password:<br />
          <input type="password" name="name" id="fname" /></label
        ><br />
        <input type="button" value="Submit" />
      </form>
    </fieldset>
  </body>
</html>
