<!DOCTYPE html>
<html>
  <head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Task Manager Web Application</h1>

    <fieldset class="fieldset-register">
      <legend><h2>LOGIN</h2></legend>
      <form action="#server">
        <label
          >Username or Email: <br />
          <input type="text" name="username" id="username" /></label
        ><br />
        <label
          >Password:<br />
          <input type="text" name="name" id="fname" /></label
        ><br />
        <input type="button" value="Submit" />
      </form>
    </fieldset>
  </body>
</html>
